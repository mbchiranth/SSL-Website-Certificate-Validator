<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSL Shield</title>
<link rel="stylesheet" href="ssl.css">
</head>

<body>

<div class="container">

    <div class="navbar">
        <div class="logo">
            <img src="shield.png" alt="shield">
            SSL SHIELD
        </div>
        <div class="status">SYSTEM ONLINE // SECURE</div>
        <div class="menu">
            <a href="#">MONITOR</a>
            <a href="#">ANALYZE</a>
            <a href="#">API</a>
        </div>
    </div>

    <div class="hero">
        <h1>Secure Your <br> <span>Digital Assets</span></h1>
        <p class="subtitle">
          Comprehensive SSL certificate analysis and vulnerability scanning for modern infrastructure.
        </p>
    </div>

    <div class="search-box">
        <input type="text" id="domain" placeholder="Enter domain (e.g., amazon.in)">
        <button id="analyzeBtn">ANALYZE</button>
    </div>

</div>

<script>
function cleanDomain(input) {
    return input
        .replace(/^https?:\/\//, "")
        .replace(/\/.*$/, "")
        .trim();
}

function redirectToProcess() {
    let domain = document.getElementById("domain").value.trim();

    if (!domain) {
        alert("Enter a valid domain first.");
        return;
    }

    domain = cleanDomain(domain);

    window.location.href = "process.html?domain=" + encodeURIComponent(domain);
}

// Button click
document.getElementById("analyzeBtn").addEventListener("click", redirectToProcess);

// Enter key support
document.getElementById("domain").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        redirectToProcess();
    }
});
</script>

</body>
</html>
